user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;
    client_max_body_size 20M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=global:10m   rate=200r/m;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone $binary_remote_addr zone=orders:10m   rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Upstream: NestJS API
    upstream nestjs_api {
        server 127.0.0.1:4000;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        limit_conn conn 30;
        limit_req zone=global burst=50 nodelay;

        # Frontend — static files
        root /var/www/celebration-cake-shop/public;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Auth API — strict rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://nestjs_api;
            include /etc/nginx/proxy_params;
        }

        # Orders
        location /api/v1/orders {
            limit_req zone=orders burst=10 nodelay;
            proxy_pass http://nestjs_api;
            include /etc/nginx/proxy_params;
        }

        # General API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://nestjs_api;
            include /etc/nginx/proxy_params;
        }

        # Swagger docs (restrict in production)
        location /api/docs {
            # Uncomment to restrict to internal only:
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://nestjs_api;
            include /etc/nginx/proxy_params;
        }

        # Health check
        location /api/health {
            access_log off;
            proxy_pass http://nestjs_api;
            include /etc/nginx/proxy_params;
        }

        # SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html { root /usr/share/nginx/html; }
    }
}
